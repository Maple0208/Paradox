  <div id="authGrid"></div>

<script>
/* ============ API 层 ============ */
var API_BASE = 'api/';

function api(endpoint, params, method){
  method = method || 'GET';
  var url = API_BASE + endpoint + '.php';
  var opts = { method:method, headers:{}, credentials:'include' };
  var token = localStorage.getItem('ems_token');
  if(token) opts.headers['X-Token'] = token;
  if(method === 'GET'){
    var qs = Object.keys(params||{}).map(function(k){ return encodeURIComponent(k)+'='+encodeURIComponent(params[k]); }).join('&');
    if(qs) url += '?' + qs;
  } else {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(params||{});
  }
  return fetch(url, opts).then(function(r){ return r.json(); }).catch(function(e){
    return { ok:false, msg:'网络错误: '+e.message };
  });
}

function apiUrl(endpoint, params){
  var qs = Object.keys(params||{}).map(function(k){ return encodeURIComponent(k)+'='+encodeURIComponent(params[k]); }).join('&');
  return API_BASE + endpoint + '.php' + (qs?'?'+qs:'');
}

/* ============ 会话 ============ */
function currentUser(){
  try {
    var raw = sessionStorage.getItem('ems_session') || getCookie('ems_user');
    return raw ? JSON.parse(decodeURIComponent(raw)) : null;
  } catch(e){ return null; }
}
function setSession(u, token){
  var s = JSON.stringify(u);
  sessionStorage.setItem('ems_session', s);
  if(token) localStorage.setItem('ems_token', token);
  document.cookie = 'ems_user=' + encodeURIComponent(s) + '; path=/';
  document.cookie = 'role=' + u.role + '; path=/';
}
function getCookie(n){
  var m = document.cookie.match(new RegExp('(?:^|; )'+n+'=([^;]*)'));
  return m ? m[1] : '';
}
function logout(){
  api('auth', {action:'logout'}, 'POST');
  sessionStorage.removeItem('ems_session');
  localStorage.removeItem('ems_token');
  document.cookie = 'ems_user=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
  location.hash = '#login';
  location.reload();
}
function qparam(n){
  var m = location.href.match(new RegExp('[?&]'+n+'=([^&#]*)'));
  return m ? decodeURIComponent(m[1]) : '';
}
function now(){
  var d = new Date(), p=function(n){return n<10?'0'+n:n;};
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes());
}
/* ============ 认证视图 ============ */
/* TODO: 移除测试账号 liwu/liwu@2000 */
function renderAuth(){
  var hash = location.hash || '#login';
  var box = '';
  if(hash.indexOf('#register')===0) box = registerForm();
  else if(hash.indexOf('#forgot')===0) box = forgotForm();
  else if(hash.indexOf('#verify')===0) box = verifyForm();
  else if(hash.indexOf('#reset')===0) box = resetForm();
  else box = loginForm();
  var view = document.getElementById('authView');
  var holder = document.getElementById('authBoxHolder');
  if(!holder){
    holder = document.createElement('div');
    holder.id = 'authBoxHolder';
    view.appendChild(holder);
  }
  holder.innerHTML = '<div class="auth-box">'+box+'</div>';
  startParticles();
}

/* 背景粒子 / 连线动画 */
var _particlesStarted = false;
function startParticles(){
  if(_particlesStarted) return;
  var cv = document.getElementById('authParticles');
  if(!cv || !cv.getContext) return;
  _particlesStarted = true;
  var ctx = cv.getContext('2d'), W, H, pts = [];
  function resize(){ W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  for(var i=0;i<60;i++){
    pts.push({ x:Math.random()*W, y:Math.random()*H, vx:(Math.random()-.5)*.4, vy:(Math.random()-.5)*.4 });
  }
  (function loop(){
    ctx.clearRect(0,0,W,H);
    for(var i=0;i<pts.length;i++){
      var p = pts[i];
      p.x += p.vx; p.y += p.vy;
      if(p.x<0||p.x>W) p.vx*=-1;
      if(p.y<0||p.y>H) p.vy*=-1;
      ctx.beginPath(); ctx.arc(p.x,p.y,1.6,0,Math.PI*2);
      ctx.fillStyle = 'rgba(120,180,255,.7)'; ctx.fill();
      for(var j=i+1;j<pts.length;j++){
        var q = pts[j], dx=p.x-q.x, dy=p.y-q.y, d=dx*dx+dy*dy;
        if(d<13000){
          ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y);
          ctx.strokeStyle = 'rgba(64,158,255,'+(0.18*(1-d/13000))+')';
          ctx.lineWidth = 1; ctx.stroke();
        }
      }
    }
    requestAnimationFrame(loop);
  })();
}

function loginForm(){
  var msg = qparam('msg');
  return '<div class="auth-brand"><span class="dot"></span><h1>MaAp1e&靶场</h1></div><div class="sub">Network Security Lab</div>'
    + (msg ? '<div class="tip ok">'+msg+'</div>' : '')
    + '<label>用户名</label><input id="li_user" placeholder="请输入用户名" value="'+qparam('u')+'">'
    + '<label>密码</label><input id="li_pwd" type="password" placeholder="请输入密码">'
    + '<button onclick="doLogin()">登 录</button>'
    + '<div class="tip err" id="li_tip"></div>'
    + '<div class="auth-links"><a href="#register">注册账号</a><a href="#forgot" class="hidden">忘记密码？</a></div>';
}
function doLogin(){
  var u = document.getElementById('li_user').value;
  var p = document.getElementById('li_pwd').value;
  api('auth', {action:'login', username:u, password:p}, 'POST').then(function(res){
    if(!res.ok){ document.getElementById('li_tip').innerText = res.msg; return; }
    setSession(res.user, res.token);
    location.hash = '#dashboard';
    location.reload();
  });
}

function registerForm(){
  return '<div class="auth-brand"><span class="dot"></span><h1>注册账号</h1></div><div class="sub">创建您的企业账号</div>'
    + '<label>用户名</label><input id="rg_user" placeholder="字母数字组合">'
    + '<label>密码</label><input id="rg_pwd" type="password" placeholder="设置密码">'

/* 角色与可见模块映射：每个菜单项的 r 字段声明可见角色 */
var ALL_ROLES = ['user','manager','admin'];
var NAV = [
  {g:'工作台'},
  {k:'dashboard', t:'仪表盘', r:ALL_ROLES},
  {k:'profile', t:'个人中心', r:ALL_ROLES},
  {k:'changepwd', t:'修改密码', r:ALL_ROLES},
  {k:'messages', t:'消息中心', r:ALL_ROLES},
  {g:'业务管理'},
  {k:'employees', t:'员工管理', r:['manager','admin']},
  {k:'customers', t:'客户管理', r:ALL_ROLES},
  {k:'comments', t:'评论系统', r:ALL_ROLES},
  {k:'notices', t:'公告系统', r:ALL_ROLES},
  {k:'search', t:'搜索功能', r:ALL_ROLES},
  {g:'文件与数据'},
  {k:'files', t:'文件管理', r:ALL_ROLES},
  {g:'系统'},
  {k:'support', t:'在线客服', r:ALL_ROLES}
];

/* 判断某角色是否可访问指定页面 */
function canAccess(role, page){
  var item = NAV.filter(function(n){ return n.k===page; })[0];
  if(!item) return false;
  return (item.r||ALL_ROLES).indexOf(role) !== -1;
}

/* 细粒度操作能力判断 */
function can(act){
  var r = (currentUser()||{}).role;
  var M = {
    emp_view:['manager','admin'], emp_edit:['manager','admin'], emp_del:['admin'],
    cust_edit:['manager','admin'], cust_del:['admin'],
    notice_edit:['manager','admin'], notice_del:['manager','admin'],
    comment_del_any:['admin']
  };
  return (M[act]||[]).indexOf(r) !== -1;
}

function renderApp(){
  var u = currentUser();
  if(!u){ location.hash='#login'; location.reload(); return; }
  document.getElementById('authView').classList.add('hidden');
  document.getElementById('appView').classList.remove('hidden');
  var nav = '';
  var pending = '';
  NAV.forEach(function(n){
    if(n.g){ pending = '<div class="nav-group">'+n.g+'</div>'; }
    else if((n.r||ALL_ROLES).indexOf(u.role) !== -1){
      if(pending){ nav += pending; pending = ''; }
      nav += '<div class="nav-item" data-k="'+n.k+'" onclick="go(\''+n.k+'\')">'+n.t+'</div>';
    }
  });
  document.getElementById('navMenu').innerHTML = nav;
  document.getElementById('topAdminEntry').classList.toggle('hidden', u.role!=='admin');
  document.getElementById('topUser').innerText = u.name + '（'+u.role+'）';
  document.getElementById('topAvatar').innerText = (u.name||u.username).charAt(0);
  api('messages', {action:'unread'}).then(function(res){
    document.getElementById('topNotice').innerHTML = (res.count) ? '<span class="badge red">'+res.count+' 条未读</span>' : '';
  });
  var page = (location.hash || '#dashboard').replace('#','').split('?')[0];
  if(!ROUTES[page]) page='dashboard';
  go(page);
}

function go(page){
  document.querySelectorAll('.nav-item').forEach(function(el){
    el.classList.toggle('active', el.getAttribute('data-k')===page);
  });
  var def = NAV.filter(function(n){return n.k===page;})[0];
  document.getElementById('crumb').innerText = def ? def.t : '仪表盘';
  if(location.hash.replace('#','').split('?')[0]!==page){ location.hash='#'+page; }
  var content = document.getElementById('content');
  content.innerHTML = '<div class="card">加载中...</div>';
  if(ROUTES[page]) ROUTES[page](currentUser(), content);
  else content.innerHTML = '<div class="card">页面不存在</div>';
}

  document.getElementById('modalRoot').innerHTML = '<div class="modal-mask" onclick="if(event.target===this)closeModal()"><div class="modal">'+html+'</div></div>';
}

ROUTES.notices = function(u, el){
  api('notices', {action:'list'}).then(function(res){
    var notices = res.list || [];
    var canEdit = can('notice_edit'), canDel = can('notice_del');
    var h = '<div class="card"><div class="card-head"><h3>公告列表</h3>'
      + (canEdit ? '<button class="success" onclick="noticeEdit()">发布公告</button>' : '') + '</div>';
    h += '<table style="table-layout:fixed"><tr>'
      + '<th>标题</th><th style="width:120px">发布人</th><th style="width:160px">时间</th><th style="width:130px">操作</th></tr>';
    notices.forEach(function(n){
      var ops = '<a class="act-link edit" href="javascript:void(0)" onclick="viewNotice('+n.id+')">查看</a>';
      if(canDel) ops += '<a class="act-link del" href="javascript:void(0)" onclick="noticeDel('+n.id+')">删除</a>';
      h += '<tr><td class="ellip" title="'+n.title+'">'+(n.top==1?'<span class="badge red">置顶</span> ':'')+n.title+'</td>'
        + '<td class="ellip">'+n.author+'</td><td>'+n.time+'</td><td>'+ops+'</td></tr>';

    if(!notices.length) h += '<div class="empty-tip">暂无公告</div>';

function viewNotice(id){

function noticeEdit(){

function noticeSave(){

/* 搜索功能 */
ROUTES.search = function(u, el){
  var kw = qparam('q');
  var h = '<div class="card"><h3>全局搜索</h3><div class="toolbar">'
    + '<input id="sc_kw" placeholder="输入关键词搜索员工/客户/公告" value="'+kw+'" style="min-width:320px">'
    + '<button onclick="doSearch()">搜索</button></div><div id="sc_result"></div></div>';
  el.innerHTML = h;

};
function doSearch(){
  var kw = document.getElementById('sc_kw').value;
  location.hash = '#search?q='+encodeURIComponent(kw);
  loadSearch(kw);
}
function loadSearch(kw){
  api('search', {q:kw}).then(function(res){
    var h = '<p style="margin:10px 0">您搜索的是：<b>'+res.q+'</b>，共找到 '+res.total+' 条结果</p>';
    h += '<h4 style="margin:10px 0 6px">员工 ('+res.employees.length+')</h4>';
    res.employees.forEach(function(e){ h += '<div class="comment">'+e.name+' - '+e.dept+' '+e.position+'</div>'; });
    h += '<h4 style="margin:10px 0 6px">客户 ('+res.customers.length+')</h4>';
    res.customers.forEach(function(c){ h += '<div class="comment">'+c.name+' - '+c.contact+'</div>'; });
    h += '<h4 style="margin:10px 0 6px">公告 ('+res.notices.length+')</h4>';
    res.notices.forEach(function(n){ h += '<div class="comment">'+n.title+'</div>'; });
    var box = document.getElementById('sc_result');
    if(box) box.innerHTML = h;
  });
}
/* 文件上传辅助 */
function onFilePick(){
  var f = document.getElementById('up_file').files[0];
  if(f){ document.getElementById('up_name').value = f.name; }
}
function doUpload(){
  var fd = new FormData();
  fd.append('action', 'upload');
  fd.append('name', document.getElementById('up_name').value);
  fd.append('path', document.getElementById('up_path').value);
  fd.append('desc', document.getElementById('up_desc').value);
  var f = document.getElementById('up_file').files[0];
  if(f) fd.append('file', f);
  fetch(apiUrl('files', {}), {method:'POST', body:fd, credentials:'include',
    headers:{'X-Token':localStorage.getItem('ems_token')||''}})
    .then(function(r){ return r.json(); })
    .then(function(res){
      var t = document.getElementById('up_tip');
      if(res.ok){ t.className='tip ok'; t.innerText='上传成功：'+res.name; renderApp(); }
      else { t.className='tip err'; t.innerText=res.msg; }
    });
}

/* 文件管理（上传 + 列表/下载） */
ROUTES.files = function(u, el){

        + '<td class="ellip" title="'+f.owner+'">'+f.owner+'</td>'

};
function previewFile(path){
  api('files', {action:'read', path:decodeURIComponent(path)}).then(function(res){
    if(!res.ok){ modal('<h3>读取失败</h3><div class="code">'+res.msg+'</div><div class="actions"><button class="plain" onclick="closeModal()">关闭</button></div>'); return; }
    var f = res.file;
    modal('<h3>'+f.name+'</h3><div class="code">'+(f.content||'(空)')+'</div><div class="actions"><button class="plain" onclick="closeModal()">关闭</button></div>');
  });
}

function doExport(fmt){
  var type = document.getElementById('ex_type').value;

}

/* 在线客服 */
ROUTES.support = function(u, el){
  api('support', {action:'list'}).then(function(res){
    var chat = res.list || [];
    var h = '<div class="card"><h3>在线客服</h3><div class="chat-box" id="chat_box">';
    chat.forEach(function(c){ h += '<div class="chat-line"><span class="who">'+c.who+'：</span>'+c.text+'</div>'; });
    h += '</div><div class="toolbar" style="margin-top:12px">'
      + '<input id="chat_in" placeholder="输入您的问题..." style="flex:1" onkeydown="if(event.key===\'Enter\')sendChat()">'
      + '<button onclick="sendChat()">发送</button></div></div>';
    el.innerHTML = h;
    var box = document.getElementById('chat_box'); box.scrollTop = box.scrollHeight;
  });
};
function sendChat(){
  var text = document.getElementById('chat_in').value;
  if(!text) return;
  api('support', {action:'send', text:text}, 'POST').then(function(res){
    var box = document.getElementById('chat_box');
    box.innerHTML += '<div class="chat-line"><span class="who">'+res.who+'：</span>'+text+'</div>'
      + '<div class="chat-line"><span class="who">客服小助手：</span>'+res.reply+'</div>';
    box.scrollTop = box.scrollHeight;
    document.getElementById('chat_in').value='';
  });
}
/* 管理员后台 */
ROUTES.admin = function(u, el){
  enterAdminConsole();
};
function exitAdminConsole(){
  document.getElementById('adminView').classList.add('hidden');
  document.getElementById('appView').classList.remove('hidden');
  location.hash = '#dashboard';
  renderApp();
}
function enterAdminConsole(tab){
  tab = tab || 'users';
  var av = document.getElementById('adminView');
  document.getElementById('appView').classList.add('hidden');
  av.classList.remove('hidden');
  var tabs = [['users','用户管理'],['perms','权限管理'],['logs','操作日志'],['settings','系统设置'],['export','数据导出'],['apitest','API测试']];
  var bar = tabs.map(function(t){
    return '<div class="ad-tab'+(t[0]===tab?' active':'')+'" onclick="enterAdminConsole(\''+t[0]+'\')">'+t[1]+'</div>';
  }).join('');
  av.innerHTML = '<div class="ad-top"><div class="brand"><span class="dot"></span>🛡️ 管理员控制台 · Admin Console</div>'
    + '<div><button class="plain" onclick="exitAdminConsole()">← 返回主系统</button> '
    + '<button class="plain" onclick="logout()">退出登录</button></div></div>'
    + '<div class="ad-body"><div class="ad-tabs">'+bar+'</div><div id="ad_body">加载中...</div></div>';
  if(tab==='logs') adminLogs();
  else if(tab==='settings') adminSettings();
  else if(tab==='apitest') adminApitest();
  else if(tab==='perms') adminPerms();
  else if(tab==='export') adminExport();
  else adminUsers();
}
function adminExport(){
  document.getElementById('ad_body').innerHTML = '<div class="ad-section"><h3>数据导出</h3>'
    + '<p style="color:#8ea3cf;margin-bottom:12px">将系统数据导出为 CSV / JSON 格式</p>'
    + '<div class="toolbar">'
    + '<select id="ex_type"><option value="employees">员工数据</option><option value="customers">客户数据</option><option value="users">用户数据</option><option value="logs">操作日志</option></select>'
    + '<button onclick="doExport(\'csv\')">导出CSV</button>'
    + '<button class="plain" onclick="doExport(\'json\')">导出JSON</button></div></div>';
}
function adminUsers(){
  api('users', {action:'list'}).then(function(res){
    var users = res.list || [], stat = res.stat || {};
    var h = '<div class="ad-cards">'
      + '<div class="ad-card"><div class="n">'+(stat.total||users.length)+'</div><div class="l">用户总数</div></div>'
      + '<div class="ad-card"><div class="n">'+(stat.admins||0)+'</div><div class="l">管理员</div></div>'
      + '<div class="ad-card"><div class="n">'+(stat.logs||0)+'</div><div class="l">操作日志</div></div>'
      + '<div class="ad-card"><div class="n">'+(stat.files||0)+'</div><div class="l">文件数</div></div></div>';
    h += '<div class="ad-section"><h3>用户管理</h3><div class="toolbar"><button class="success" onclick="adminEditUser()">新增用户</button></div>';
    h += '<table><tr><th>ID</th><th>用户名</th><th>姓名</th><th>角色</th><th>部门</th><th>状态</th><th>余额</th><th>操作</th></tr>';
    users.forEach(function(x){
      h += '<tr><td>'+x.id+'</td><td>'+x.username+'</td><td>'+x.name+'</td>'
        + '<td><span class="badge '+(x.role==='admin'?'admin':'user')+'">'+x.role+'</span></td>'
        + '<td>'+x.dept+'</td><td><span class="badge '+(x.status==='active'?'green':'red')+'">'+x.status+'</span></td>'
        + '<td>¥'+(x.balance||0)+'</td>'
        + '<td><a href="javascript:void(0)" onclick=\'adminEditUser('+JSON.stringify(x)+')\'>编辑</a> | '
        + '<a href="javascript:void(0)" onclick="adminToggle('+x.id+')">'+(x.status==='active'?'禁用':'启用')+'</a> | '
        + '<a href="javascript:void(0)" onclick="adminDelUser('+x.id+')">删除</a></td></tr>';
    });
    h += '</table></div>';
    document.getElementById('ad_body').innerHTML = h;
  });
}
function adminPerms(){
  api('users', {action:'list'}).then(function(res){
    var users = res.list || [];
    var h = '<div class="ad-section"><h3>角色权限配置</h3>'
      + '<table><tr><th>用户</th><th>当前角色</th><th>可访问模块</th><th>调整</th></tr>';
    users.forEach(function(x){
      var mods = x.role==='admin' ? '全部模块' : (x.role==='manager' ? '业务+公告' : '基础模块');
      h += '<tr><td>'+x.name+'</td><td>'+x.role+'</td><td>'+mods+'</td>'
        + '<td><select onchange="changeRole('+x.id+', this.value)">'
        + '<option value="user" '+(x.role==='user'?'selected':'')+'>user</option>'
        + '<option value="manager" '+(x.role==='manager'?'selected':'')+'>manager</option>'
        + '<option value="admin" '+(x.role==='admin'?'selected':'')+'>admin</option></select></td></tr>';
    });
    h += '</table></div>';
    document.getElementById('ad_body').innerHTML = h;
  });
}
function adminLogs(){
  api('logs', {}).then(function(res){
    var logs = res.list || [];
    var h = '<div class="ad-section"><h3>操作日志</h3><table><tr><th>用户</th><th>操作</th><th>IP</th><th>时间</th></tr>';
    logs.forEach(function(l){ h += '<tr><td>'+l.user+'</td><td>'+l.action+'</td><td>'+l.ip+'</td><td>'+l.time+'</td></tr>'; });
    h += '</table></div>';
    document.getElementById('ad_body').innerHTML = h;
  });
}
function adminSettings(){
  api('settings', {action:'get'}).then(function(res){
    var s = res.settings || {};
    var h = '<div class="ad-section"><h3>系统设置</h3>'
      + '<label>SMTP服务器</label><input id="st_smtp" value="'+(s.smtp||'')+'">'
      + '<label>API密钥</label><input id="st_apikey" value="'+(s.apiKey||'')+'">'
      + '<label>系统版本</label><input id="st_ver" value="'+(s.version||'')+'" readonly>'
      + '<label><input type="checkbox" id="st_reg" style="width:auto;display:inline" '+(s.registerOpen==='1'?'checked':'')+'> 开放注册</label>'
      + '<label><input type="checkbox" id="st_debug" style="width:auto;display:inline" '+(s.debug==='1'?'checked':'')+'> 调试模式</label>'
      + '<button style="margin-top:16px" onclick="saveSettings()">保存设置</button></div>';
    if(res.debug){
      var d = res.debug;
      h += '<div class="ad-section"><h3>调试信息</h3><div class="code">'
        + 'env='+d.env+'\ndb='+d.db+'\napiKey='+d.apiKey+'\nsmtp='+d.smtp+'\ntoken='+d.token+'\ncookie='+d.cookie+'</div></div>';
    }
    document.getElementById('ad_body').innerHTML = h;

function adminApitest(){
  document.getElementById('ad_body').innerHTML = '<div class="ad-section"><h3>API 测试工具</h3>'
    + '<div class="toolbar"><select id="api_ep">'
    + '<option value="/api/user/info">GET /api/user/info?id=</option>'
    + '<option value="/api/users/list">GET /api/users/list</option>'
    + '<option value="/api/customer/detail">GET /api/customer/detail?id=</option>'
    + '<option value="/api/file/read">GET /api/file/read?path=</option>'
    + '<option value="/api/admin/config">GET /api/admin/config</option></select>'
    + '<input id="api_param" placeholder="参数值" style="min-width:200px">'
    + '<button onclick="callApi()">发送请求</button></div>'
    + '<div class="code hidden" id="api_out"></div></div>';
}
function adminEditUser(x){
  x = x || {id:'',username:'',password:'',name:'',role:'user',dept:'',balance:0};
  modal('<h3>'+(x.id?'编辑':'新增')+'用户</h3>'
    + '<input type="hidden" id="au_id" value="'+x.id+'">'
    + '<label>用户名</label><input id="au_user" value="'+x.username+'">'
    + '<label>密码</label><input id="au_pwd" value="'+(x.password||'')+'">'
    + '<label>姓名</label><input id="au_name" value="'+x.name+'">'
    + '<label>角色</label><select id="au_role"><option value="user" '+(x.role==='user'?'selected':'')+'>user</option><option value="manager" '+(x.role==='manager'?'selected':'')+'>manager</option><option value="admin" '+(x.role==='admin'?'selected':'')+'>admin</option></select>'
    + '<label>部门</label><input id="au_dept" value="'+x.dept+'">'
    + '<label>余额</label><input id="au_balance" value="'+(x.balance||0)+'">'
    + '<div class="actions"><button class="plain" onclick="closeModal()">取消</button><button onclick="adminSaveUser()">保存</button></div>');
}
function adminSaveUser(){
  api('users', {action:'save', id:document.getElementById('au_id').value,
    username:document.getElementById('au_user').value, password:document.getElementById('au_pwd').value,
    name:document.getElementById('au_name').value, role:document.getElementById('au_role').value,
    dept:document.getElementById('au_dept').value, balance:document.getElementById('au_balance').value}, 'POST')
    .then(function(){ closeModal(); adminUsers(); });
}
function adminToggle(id){ api('users', {action:'toggle', id:id}, 'POST').then(function(){ adminUsers(); }); }
function adminDelUser(id){ api('users', {action:'delete', id:id}, 'POST').then(function(){ adminUsers(); }); }
function changeRole(id, role){ api('users', {action:'changerole', id:id, role:role}, 'POST').then(function(){ adminPerms(); }); }

function saveSettings(){
  api('settings', {action:'save',
    smtp:document.getElementById('st_smtp').value,
    apiKey:document.getElementById('st_apikey').value,
    registerOpen:document.getElementById('st_reg').checked?'1':'0',
    debug:document.getElementById('st_debug').checked?'1':'0'}, 'POST')
    .then(function(){ alert('已保存'); adminSettings(); });
}

function callApi(){
  var ep = document.getElementById('api_ep').value;
  var param = document.getElementById('api_param').value;
  api('apitest', {ep:ep, p:param}).then(function(res){
    var out = document.getElementById('api_out');
    out.classList.remove('hidden');
    out.innerText = 'GET '+res.endpoint+(param?'?p='+param:'')+'\nStatus: '+res.status+'\n\n'+JSON.stringify(res.data, null, 2);
  });
}

/* ============ 启动 ============ */
window.addEventListener('hashchange', function(){
  var h = location.hash;
  if(h.indexOf('#login')===0||h.indexOf('#register')===0||h.indexOf('#forgot')===0||h.indexOf('#verify')===0||h.indexOf('#reset')===0){
    if(!currentUser()){ document.getElementById('appView').classList.add('hidden'); document.getElementById('authView').classList.remove('hidden'); renderAuth(); return; }
  }
  if(currentUser()) renderApp();
});
(function boot(){
  if(currentUser() && location.hash.indexOf('#login')!==0){
    renderApp();
  } else {
    document.getElementById('appView').classList.add('hidden');
    document.getElementById('authView').classList.remove('hidden');
    renderAuth();
  }
})();
</script>
